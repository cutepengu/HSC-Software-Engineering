<!DOCTYPE html>
<html lang="en-AU">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registration Successful</title>
<link rel="stylesheet" href="../style.css">
<style>
body {
    margin: 0;
    background-image: url('../images/blue_display.png');
    background-size: cover;
    background-position: center;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}
</style>
</head>
<body>

<div class="container">
    <h2>Registration Successful!</h2>
    <p><strong>Name:</strong> <span id="displayName"></span></p>
    <p><strong>Email:</strong> <span id="displayEmail"></span></p>
    <p><strong>Date of Birth:</strong> <span id="displayDob"></span></p>

    <button onclick="window.location.href='login.html'">Go to Login</button>
</div>



<script>
document.addEventListener("DOMContentLoaded", () => {
    // Get the email of the user who just signed up
    const currentEmail = sessionStorage.getItem("currentUser");

    if (!currentEmail) return;

    // Load all users from localStorage
    const users = JSON.parse(localStorage.getItem("users")) || {};

    // Get this user's data
    const user = users[currentEmail];

    if (!user) return;

    // Display the user's info
    document.getElementById("displayName").textContent = user.name;
    document.getElementById("displayEmail").textContent = user.email;
    document.getElementById("displayDob").textContent = user.dob;
});
</script>


</body>
</html>
