<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="../style.css">
    <script src="../auth.js" defer></script>
</head>
<body>

<button class="back-btn" onclick="window.history.back()">
    <img src="../images/back_button.png" alt="Back">
</button>

<div class="center-box">
    <h2>Login</h2>

    <form id="loginForm" autocomplete="off" onsubmit="return false;">
        <label>Email:</label><br>
        <input type="email" id="email" autocomplete="off">

        <label>Password:</label><br>
        <input type="password" id="password" autocomplete="new-password">

        <button type="button" onclick="loginUser()">Login</button>
    </form>

    <p style="margin-top:10px;">No account? <a href="signup.html">Sign up</a></p>
    <p id="errorMessage" class="error" style="color:red;"></p>
</div>

</body>
</html>
