<!DOCTYPE html>
<html lang="en-AU">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up - Deep Sea Explorer</title>
<link rel="stylesheet" href="../style.css">
<script src="../auth.js" defer></script>
<script>
function goBack() { window.history.back(); }
</script>
</head>
<body>

<button class="back-btn" onclick="goBack()">
    <img src="../images/back_button.png" alt="Back">
</button>

<div class="container">
    <h2>Sign Up</h2>

    <form id="signupForm" autocomplete="off" onsubmit="return false;">

        <div class="form-group">
            <label>Name:</label><br>
            <input type="text" id="name" autocomplete="off">
        </div>

        <div class="form-group">
            <label>Email:</label><br>
            <input type="email" id="email" autocomplete="off">
        </div>

        <div class="form-group">
            <label>Date of Birth:</label><br>
            <input type="date" id="dob">
        </div>

        <div class="form-group">
            <label>Password:</label><br>
            <input type="password" id="password" autocomplete="new-password">
        </div>

        <button type="button" onclick="signup()">Register</button>
    </form>

    <p id="errorMessage" class="error" style="color:red;"></p>
</div>

</body>
</html>
