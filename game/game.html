<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Deep Sea Explorer</title>
    <link rel="stylesheet" href="game.css">
    <script src="game.js" defer></script>
</head>
<body>

    <!-- TOP BAR -->
    <div id="top-bar">
        <h2>Deep Sea Explorer</h2>
        <div id="top-buttons">
            <button id="btn-quiz">Mini Games</button>
        </div>
    </div>

    <!-- MAIN OCEAN AREA -->
    <div id="ocean"></div>

    <!-- INFO PANEL (FISH DETAILS) -->
    <div id="info-panel" class="hidden">
        <h3 id="info-name"></h3>
        <p id="info-depth"></p>
        <p id="info-size"></p>
        <p id="info-weight"></p>
        <p id="info-lifespan"></p>
        <p id="info-diet"></p>
        <p id="info-fact"></p>

        <!-- BUY BUTTON -->
        <button id="info-buy">Buy This Fish</button>

        <button id="info-close">Close</button>
    </div>

    <!-- MINI‑GAME MENU -->
    <div id="menu-overlay" class="hidden">
        <div id="menu-box">
            <h3>Choose a Mini Game</h3>
            <button id="btn-guess">Guess!</button>
            <button id="btn-catch">Catch!</button>
            <button id="menu-close">Back to Ocean</button>
        </div>
    </div>

    <!-- GUESS! QUIZ OVERLAY -->
    <div id="quiz-overlay" class="hidden">
        <div id="quiz-box">
            <h3>Guess! – Fish Facts Quiz</h3>
            <p id="quiz-question"></p>
            <div id="quiz-options"></div>
            <p id="quiz-feedback"></p>
            <button id="quiz-next">Next Question</button>
            <button id="quiz-exit">Exit</button>
        </div>
    </div>

    <!-- CATCH! OVERLAY -->
    <div id="catch-overlay" class="hidden">
        <div id="catch-box">
            <h3>Catch!</h3>
            <p>Click as many fish as you can in 15 seconds!</p>
            <p>Score: <span id="catch-score">0</span></p>
            <button id="catch-start">Start</button>
            <button id="catch-exit">Exit</button>
        </div>
    </div>

    <!-- BOTTOM‑LEFT HUD: COINS + INVENTORY -->
    <div id="hud-bottom-left">
        <span id="coin-icon">🪙</span>
        <span id="coin-count">0</span>
        <button id="btn-inventory" class="hud-button">🎒</button>
    </div>

    <!-- BOTTOM‑RIGHT HUD: LOGOUT BUTTON -->
    <div id="hud-bottom-right">
        <button id="btn-logout" class="hud-button">Logout</button>
    </div>

    <!-- INVENTORY OVERLAY -->
    <div id="inventory-overlay" class="overlay hidden">
        <div class="overlay-content">
            <h2>Your Fish Inventory</h2>
            <ul id="inventory-list"></ul>
            <button id="inventory-close">Close</button>
        </div>
    </div>

    <!-- LOGOUT CONFIRMATION OVERLAY -->
    <div id="logout-overlay" class="overlay hidden">
        <div class="overlay-content">
            <p>Do you want to log out?</p>
            <button id="logout-yes">Yes</button>
            <button id="logout-no">No</button>
        </div>
    </div>

</body>
</html>
